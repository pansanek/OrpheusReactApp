name: CI Pipeline

on:
  push:
    branches: [main, dev, code_refactoring]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Type Check
        run: |
          pnpm lint
          pnpm tsc --noEmit

      - name: Run Tests
        run: pnpm test -- --run
        env:
          CI: true

      - name: Build Project
        run: pnpm build
        env:
          CI: true

